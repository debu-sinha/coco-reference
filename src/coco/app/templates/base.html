<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/htmx-ext-sse.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="navbar-title">
                <a href="/" class="navbar-home-link">{{ app_title }}</a>
            </h1>
            <div class="navbar-user">
                <svg class="icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path fill="currentColor" d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5Z"/>
                </svg>
                <span>{{ user_id }}</span>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Databricks</p>
    </footer>

    <script>
    // Auto-scroll message container to bottom when new content arrives
    document.addEventListener('htmx:afterSwap', function(e) {
        var container = document.getElementById('message-list');
        if (container) {
            container.scrollTop = container.scrollHeight;
        }
    });

    // Also scroll on SSE message events (the assistant reply landing)
    document.addEventListener('htmx:sseMessage', function(e) {
        var container = document.getElementById('message-list');
        if (container) {
            container.scrollTop = container.scrollHeight;
        }
    });

    // Cmd+Enter / Ctrl+Enter to send from the compose textarea
    document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            var textarea = document.querySelector('.compose-textarea');
            if (textarea && document.activeElement === textarea) {
                var form = textarea.closest('form');
                if (form) {
                    // Trigger HTMX-aware submit (not native form.submit()
                    // which bypasses HTMX)
                    htmx.trigger(form, 'submit');
                }
            }
        }
    });

    // Disable the Send button while an HTMX request is in flight
    document.addEventListener('htmx:beforeRequest', function(e) {
        var btn = e.detail.elt.querySelector('button[type="submit"]');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'Sending...';
        }
    });
    document.addEventListener('htmx:afterRequest', function(e) {
        var btn = e.detail.elt.querySelector('button[type="submit"]');
        if (btn) {
            btn.disabled = false;
            btn.textContent = 'Send';
        }
    });

    // Honest progress: just "Working..." with elapsed time. The earlier
    // version cycled through predicted steps on a timer which lied to
    // the user about what the agent was actually doing. When we add
    // real SSE events per tool call we can resume showing the real
    // step name here.
    var _progressTimer = null;
    document.addEventListener('htmx:afterSwap', function(e) {
        var bubble = document.querySelector('[data-streaming="1"] .message-content:empty');
        if (!bubble) return;
        var startTime = Date.now();
        _progressTimer = setInterval(function() {
            if (bubble.children.length > 0 || bubble.textContent.trim()) {
                clearInterval(_progressTimer); _progressTimer = null; return;
            }
            var elapsed = Math.round((Date.now() - startTime) / 1000);
            bubble.setAttribute('data-status', 'Working\u2026 (' + elapsed + 's)');
        }, 1000);
    });
    document.addEventListener('htmx:sseMessage', function(e) {
        if (_progressTimer) { clearInterval(_progressTimer); _progressTimer = null; }
        var bubble = document.querySelector('[data-streaming="1"] .message-content');
        if (bubble) bubble.removeAttribute('data-status');
    });

    // Modal helpers: any element with data-modal-open="id" opens the
    // matching backdrop; any element with data-modal-close closes its
    // parent backdrop. Esc key and backdrop click both close.
    document.addEventListener('click', function(e) {
        var opener = e.target.closest('[data-modal-open]');
        if (opener) {
            var m = document.getElementById(opener.getAttribute('data-modal-open'));
            if (m) { m.hidden = false; m.classList.add('is-open'); }
            return;
        }
        var closer = e.target.closest('[data-modal-close]');
        if (closer) {
            var m2 = closer.closest('.modal-backdrop');
            if (m2) { m2.hidden = true; m2.classList.remove('is-open'); }
            return;
        }
        if (e.target.classList && e.target.classList.contains('modal-backdrop')) {
            e.target.hidden = true;
            e.target.classList.remove('is-open');
        }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            var open = document.querySelector('.modal-backdrop.is-open');
            if (open) { open.hidden = true; open.classList.remove('is-open'); }
        }
    });
    </script>
</body>
</html>
